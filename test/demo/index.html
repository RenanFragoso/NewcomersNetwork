<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	
	<title>Full Width Image Slider Demo</title>
	<meta name="description" content="">
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="stylesheet" href="demo.css?=2">
	<link rel="stylesheet" href="../slider.min.css?=3">
</head>
<body>
    
	<div class="wrapper">
		<h1>jQuery Full Width Slider</h1>
		<h2>Lightweight, responsive, full width image Slider</h2>
		<div class="full-width">
			<div class="inner">
				<div class="slide">
					<div>Lorem ipsum dolor sit amet, consectetur. <br>Curabitur molestie elit et ultricies vehicula.</div>
					<img src="../teste1_img.png">
				</div>
			<div class="controls">
				<a href="#" class="left">&larr;</a>
				<a href="#" class="right">&rarr;</a>
			</div>
			<div class="slide-nav"></div>
		</div>
	</div>
	
	<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
	<script src="../slider.min.js"></script>
	<script>
        // Just to fix IE issues when console isn't defined, only used for the demo - not required for the slider
        window.console = window.console || {
            log: function () {}
        };
        $('.full-width').fullWidth()
            .on('fws.start', function(e, data){
                console.log( 'Moving '+ data.direction +' from slide '+ data.status.previous +' to slide '+ data.status.current );
            })
            .on('fws.finish', function(e, data){
                console.log( 'Moved from slide ' + data.status.previous + ' to slide ' + data.status.current );
            });
	</script>
</body>
</html>
